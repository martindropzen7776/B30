  <style>
    :root{
      --bg1:#050b16; --bg2:#0c1526; --bg3:#111a2f;
      --text:#ffffff;
      --accent:#007BFF; /* azul eléctrico */
      --accent2:#00D9FF; /* azul glow */
      --gold:#FFD700;
      --glow:#00b8ff;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh;
      font-family:'Montserrat',sans-serif;
      display:flex; align-items:center; justify-content:center;
      background:radial-gradient(circle at top, var(--bg1), var(--bg2) 60%, var(--bg3));
      color:var(--text);
      text-align:center;
      padding:20px;
    }
    .container{ max-width:420px; width:100%; }

    /* LOGO */
    .logo{
      width:220px; height:220px; margin:0 auto 25px;
      border-radius:50%;
      background:linear-gradient(145deg,rgba(0,123,255,0.2),rgba(255,215,0,0.1));
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 25px rgba(0,185,255,0.45);
      overflow:hidden;
      animation:glow 2.5s ease-in-out infinite alternate;
    }
    .logo img{
      width:90%; height:90%;
      object-fit:contain;
    }
    @keyframes glow{
      from{ box-shadow:0 0 15px rgba(0,185,255,0.3); }
      to{ box-shadow:0 0 35px rgba(255,215,0,0.5); }
    }

    h1{ font-size:22px; margin:10px 0; font-weight:800; }
    .verified{
      color:var(--gold);
      font-weight:800;
      margin-bottom:20px;
      letter-spacing:0.5px;
    }

    /* FORMULARIO (CAJA) */
    .form-box{
      background:rgba(255,255,255,0.05);
      padding:25px 20px;
      border-radius:14px;
      box-shadow:0 8px 25px rgba(0,0,0,0.45);
      margin-bottom:20px;
      backdrop-filter:blur(6px);
    }

    .cta-btn{
      width:100%; padding:15px 20px; font-size:16px; font-weight:800;
      color:#fff; background:linear-gradient(90deg,var(--accent),var(--gold));
      border:none; border-radius:50px; cursor:pointer;
      box-shadow:0 6px 20px rgba(0,0,0,0.35);
      transition:all .3s ease; text-transform:uppercase;
      letter-spacing:0.5px;
    }
    .cta-btn:hover{
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 8px 25px rgba(0,185,255,0.45);
    }

    /* FOOTER */
    .footer{ margin-top:20px; }
    .footer p{
      color:var(--gold);
      font-size:19px;
      text-shadow:0 2px 12px rgba(255,215,0,0.35);
      margin:10px 0;
    }
    .footer h2{
      font-size:17px;
      font-weight:800;
      margin:4px 0;
      color:#aad6ff;
    }

    /* RESPONSIVE */
    @media (max-width:480px){
      h1{ font-size:20px; }
      .logo{ width:180px; height:180px; }
      .cta-btn{ font-size:15px; padding:14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- LOGO -->
    <div class="logo">
      <img src="avatar.jpeg" alt="Bet30">
    </div>

    <!-- TÍTULO -->
    <h1>Envíanos un WhatsApp para crear tu cuenta</h1>
    <div class="verified">💎 PLATAFORMA VERIFICADA ✅</div>

    <!-- SOLO BOTÓN -->
    <div class="form-box">
      <button id="cta-btn" class="cta-btn">CREAR MI USUARIO ➤</button>
    </div>

    <!-- TEXTO INFERIOR -->
    <div class="footer">
      <p>🎁 HASTA 100% EXTRA</p>
      <h2>💸 CARGA Y RETIRA LAS 24 HS</h2>
    </div>
  </div>

  <script>
    (function(){
      // 📱 Rotación de números de WhatsApp
      const numbers = [
        "5493517705089",
        "5493815953475",
      ];

      function pickNumber(){
        const last = localStorage.getItem("lastNumber");
        let choice = numbers[Math.floor(Math.random()*numbers.length)];
        if(numbers.length > 1 && choice === last){
          const others = numbers.filter(n => n !== last);
          choice = others[Math.floor(Math.random()*others.length)];
        }
        localStorage.setItem("lastNumber", choice);
        return choice;
      }

      const btn = document.getElementById("cta-btn");
      btn.addEventListener("click", function(){
        const number = pickNumber();
        const ref = "BT_" + Math.random().toString(36).substring(2,8).toUpperCase();
        const user = "no_proporcionado";

        const msg = `Hola, quiero mi usuario \nMi código promocional es: ${ref}`;
        const url = `https://wa.me/${number}?text=${encodeURIComponent(msg)}&ref=${encodeURIComponent(ref)}`;

        // 🎯 TRACKING
        if (typeof fbq === "function") {
          fbq("track", "Lead", { destino:number, user, ref });
        }
        if (typeof gtag === "function") {
          gtag("event", "generate_lead", {
            event_category: "engagement",
            event_label: "WhatsApp",
            value: 1,
            user: user,
            ref: ref,
            number: number
          });
        }

        // Redirección a WhatsApp
        window.location.href = url;
      });
    })();
  </script>
</body>
</html>
